services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: codeseek
      POSTGRES_USER: codeseek
      POSTGRES_PASSWORD: codeseek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  codeseek-api:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CODESEEK_DB_BACKEND=${CODESEEK_DB_BACKEND:-sqlite}
      - CODESEEK_DATABASE_URL=${CODESEEK_DATABASE_URL:-}

volumes:
  postgres_data:
  qdrant_storage:
